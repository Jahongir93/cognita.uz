version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gogame_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gogame}
      POSTGRES_USER: ${POSTGRES_USER:-gogame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gogame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Go + Fiber) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gogame_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-gogame}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-gogame}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: 24
      REFRESH_EXPIRY_HOURS: 168
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8080:8080"

  # ── Frontend (SvelteKit) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: gogame_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      ORIGIN: ${FRONTEND_URL:-http://localhost:3000}

volumes:
  postgres_data:
  uploads_data:
