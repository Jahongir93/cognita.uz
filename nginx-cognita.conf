# ════════════════════════════════════════════════════════════════════════════
#  Cognita.uz — nginx reverse proxy
#  Bitta domen orqali:  /api/ va /ws/ → backend (8080),  qolgani → frontend (3000)
# ════════════════════════════════════════════════════════════════════════════
#
#  FOYDALANISH (2 usuldan biri):
#
#  A) FastPanel'da "Reverse proxy" sayt sifatida (TAVSIYA):
#     - Saytni proxy → http://127.0.0.1:3000 qilib yarating
#     - Keyin pastdagi /api/ va /ws/ bloklarini saytning
#       "Qo'shimcha nginx direktivalari" (Additional nginx directives) ga joylang
#       ( location / kerak emas — proxy sayt o'zi root'ni 3000'ga yuboradi )
#
#  B) To'liq qo'lda nginx vhost (FastPanel boshqaruvisiz):
#     - Pastdagi to'liq server blokini ishlating (SSL qatorlarini moslang)
# ════════════════════════════════════════════════════════════════════════════

# ── /api/ va /ws/ uchun (A usulda shu ikki blokni qo'shimcha direktivaga qo'ying) ──

location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m;          # fayl import uchun (MAX_FILE_SIZE_MB=20)
}

location /ws/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_read_timeout 3600s;           # WebSocket uzoq ulanish uchun
}

